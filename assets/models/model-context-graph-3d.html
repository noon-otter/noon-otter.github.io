   Model Context Graph — three.js
   Asymmetric, flat-ish layout. Multiple models, with cross-links
   between models, and lineage edges that wire jobs back to the
   specific experiments they belong to.
   ============================================================ */

// ---------- Scene ----------

// ---------- Palette ----------
// Colors sampled from the editorial reference layouts: bright cyan, mint, orange,
// hot pink, violet, warm yellow, coral, and a deeper steel blue. Models stay white.
const C = {

  modelPeer:    0xffffff, // peer models also white per direction

// ---------- Helpers ----------
function makeLabel(text, colorHex, scale = 1) {
  const canvas = document.createElement('canvas');
  const W = 512, H = 128;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.font = '600 54px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.95)';
  ctx.shadowBlur = 18;
  ctx.fillStyle = '#000'; ctx.fillText(text, W / 2, H / 2);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#' + colorHex.toString(16).padStart(6, '0');
  ctx.fillText(text, W / 2, H / 2);
  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(4 * scale, 1 * scale, 1);
  sprite.renderOrder = 999;
  return sprite;
}

// Build a {body, shell} geometry pair for a given abstract shape.
function geometryFor(shape, size, isCore) {
  const detail = isCore ? 1 : 0;
  const s = size, ss = size * 1.18;
  switch (shape) {
    case 'octa':
      return [new THREE.OctahedronGeometry(s, 0), new THREE.OctahedronGeometry(ss, 0)];
    case 'tetra':
      return [new THREE.TetrahedronGeometry(s, 0), new THREE.TetrahedronGeometry(ss, 0)];
    case 'sphere':
      return [new THREE.SphereGeometry(s, 18, 12), new THREE.SphereGeometry(ss, 14, 10)];
    case 'dodeca':
      return [new THREE.DodecahedronGeometry(s, 0), new THREE.DodecahedronGeometry(ss, 0)];
    case 'box':
      return [new THREE.BoxGeometry(s*1.3, s*1.3, s*1.3), new THREE.BoxGeometry(s*1.55, s*1.55, s*1.55)];
    case 'cone':
      return [new THREE.ConeGeometry(s*0.95, s*1.8, 6), new THREE.ConeGeometry(s*1.12, s*2.05, 6)];
    case 'cylinder':
      return [new THREE.CylinderGeometry(s*0.75, s*0.75, s*1.7, 8), new THREE.CylinderGeometry(s*0.9, s*0.9, s*1.95, 8)];
    case 'icosa':
    default:
      return [new THREE.IcosahedronGeometry(s, detail), new THREE.IcosahedronGeometry(ss, detail)];
  }
}

// Pick an abstract shape per category so each cluster has a distinct silhouette.
function shapeFor(id) {
  if (id === 'M0') return 'icosa';
  if (id.startsWith('M'))    return 'icosa';
  if (id.startsWith('EP'))   return 'octa';
  if (id.startsWith('AG'))   return 'tetra';
  if (id.startsWith('APP'))  return 'sphere';
  if (id.startsWith('GA'))   return 'dodeca';
  if (id.startsWith('DS'))   return 'box';
  if (id.startsWith('EX'))   return 'cone';
  if (id.startsWith('JB'))   return 'icosa';
  if (id.startsWith('ENV'))  return 'cylinder';
  return 'icosa';
}

// Soft additive glow disc — used as a sprite "lens halo" behind each node.
const _glowTexCache = new Map();
function glowTexture(colorHex) {
  if (_glowTexCache.has(colorHex)) return _glowTexCache.get(colorHex);
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const hex = '#' + colorHex.toString(16).padStart(6, '0');
  const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
  grad.addColorStop(0.0, hex + 'cc');
  grad.addColorStop(0.25, hex + '66');
  grad.addColorStop(0.55, hex + '1f');
  grad.addColorStop(1.0,  hex + '00');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 128, 128);
  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  _glowTexCache.set(colorHex, tex);
  return tex;
}

function makeGlowSprite(colorHex, size) {
  const mat = new THREE.SpriteMaterial({
    map: glowTexture(colorHex),
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const s = new THREE.Sprite(mat);
  s.scale.setScalar(size);
  s.renderOrder = -1; // draw before solid bodies
  return s;
}

function makeNode(size, colorHex, shape, isCore = false) {
  const [bodyGeo, shellGeo] = geometryFor(shape, size, isCore);
  const mat = new THREE.MeshPhongMaterial({
    color: colorHex,
    emissive: colorHex,
    emissiveIntensity: isCore ? 0.95 : 0.6,
    shininess: 80,
    flatShading: true,
    transparent: true,
    opacity: 0.92,
  });
  const mesh = new THREE.Mesh(bodyGeo, mat);

  // Outer wireframe shell — lives as a sibling so we can counter-rotate it
  // independently of the body for that "two layers, two lives" feel.
  const shellMat = new THREE.MeshBasicMaterial({
    color: colorHex, wireframe: true, transparent: true, opacity: isCore ? 0.55 : 0.34,
  });
  const shell = new THREE.Mesh(shellGeo, shellMat);
  mesh.add(shell);

  // Soft additive halo behind the body — gives every crystal a faint bloom.
  const haloScale = isCore ? size * 6.5 : (size > 0.4 ? size * 5.0 : size * 4.2);
  const halo = makeGlowSprite(colorHex, haloScale);
  mesh.add(halo);

  // Random initial orientation so cones / cylinders / tetras don't all point up.
  mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
  mesh.userData.spin = new THREE.Vector3(
    (Math.random() - 0.5) * 0.45,
    (Math.random() - 0.5) * 0.45,
    (Math.random() - 0.5) * 0.45
  );
  // Shell counter-spins relative to body for that subtle "the outline is
  // moving on its own" effect that reads as crystalline life.
  mesh.userData.shell = shell;
  mesh.userData.shellSpin = mesh.userData.spin.clone().multiplyScalar(-1.45);
  return mesh;
}

// Thin orbital ring (Torus) — used to dress the central model.
function makeOrbitRing(radius, colorHex, opacity = 0.32) {
  const geo = new THREE.TorusGeometry(radius, 0.018, 6, 128);
  const mat = new THREE.MeshBasicMaterial({
    color: colorHex,
    transparent: true,
    opacity,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  return new THREE.Mesh(geo, mat);
}

// Solid edge as a thin cylinder. `weight`: 'strong' | 'normal' | 'cross'.
function makeEdge(p1, p2, colorHex, weight = 'normal') {
  const dir = new THREE.Vector3().subVectors(p2, p1);
  const len = dir.length();
  let radius, opacity, haloOpacity;
  if (weight === 'strong')      { radius = 0.085; opacity = 0.95; haloOpacity = 0.32; }
  else if (weight === 'normal') { radius = 0.05;  opacity = 0.78; haloOpacity = 0.20; }
  else /* cross */              { radius = 0.028; opacity = 0.28; haloOpacity = 0.06; }

  const geo = new THREE.CylinderGeometry(radius, radius, len, 12, 1, false);
  geo.translate(0, len / 2, 0);
  const mat = new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(p1);
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());

  const haloGeo = new THREE.CylinderGeometry(radius * 2.8, radius * 2.8, len, 12, 1, false);
  haloGeo.translate(0, len / 2, 0);
  const haloMat = new THREE.MeshBasicMaterial({
    color: colorHex, transparent: true, opacity: haloOpacity,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  mesh.add(new THREE.Mesh(haloGeo, haloMat));
  return mesh;
}

  ['ENV2','ENV2a'],

  // ---- Cross-model serves: surfaces that reach into peer models ----
  // To embed model (M1)
  ['APP3','M1','cross'],
  ['AG1', 'M1','cross'],
  ['EP2', 'M1','cross'],
  // To classifier (M2)
  ['GA',  'M2','cross'],
  ['EP1', 'M2','cross'],
  ['APP1','M2','cross'],
  // To summarizer (M3) — the new peer model
  ['GA2', 'M3','cross'],
  ['EP4', 'M3','cross'],
  ['AG2a','M3','cross'],
  ['DS1a','M3','cross'],
];

// ---------- Build ----------
const animatedNodes = [];

for (const n of nodes) {
  const mesh = makeNode(n.size, n.color, shapeFor(n.id), !!n.isCore);
  mesh.position.fromArray(n.pos);
  root.add(mesh);
  animatedNodes.push({
    mesh,
    phase: (mesh.position.x + mesh.position.z) * 0.3,
    pulseAmp: n.isCore ? 0.05 : (n.size > 0.5 ? 0.07 : 0.09),
  });
  // (Text labels intentionally omitted — keeping the plot purely abstract.)
}

// ---------- Orbital rings around the central model ----------
// Two thin tori at slightly different tilts, each with its own slow drift.
const orbitRings = [];
{
  const r1 = makeOrbitRing(2.6, 0xffffff, 0.28);
  r1.rotation.x = Math.PI / 2.2;
  r1.rotation.z = 0.18;
  root.add(r1);
  orbitRings.push({ mesh: r1, axis: new THREE.Vector3(0, 1, 0), speed: 0.18 });

  const r2 = makeOrbitRing(3.1, 0xb8c4dc, 0.20);
  r2.rotation.x = Math.PI / 1.6;
  r2.rotation.y = 0.4;
  root.add(r2);
  orbitRings.push({ mesh: r2, axis: new THREE.Vector3(1, 0, 0.3).normalize(), speed: -0.13 });
}

for (const [a, b, weight] of edges) {
  const na = N[a], nb = N[b];
  const p1 = new THREE.Vector3().fromArray(na.pos);
  const p2 = new THREE.Vector3().fromArray(nb.pos);
  // Color: use the destination color for hub→leaf, midpoint-feel via "from" color for cross
  const color = (weight === 'cross') ? na.color : nb.color;
  root.add(makeEdge(p1, p2, color, weight || 'normal'));
}

// ---------- Ambient particle field ----------
{
  const count = 800;
  const positions = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    // Bias particles into a flatter disc-ish cloud so they reinforce the layout shape
    const r = 18 + Math.random() * 38;
    const t = Math.random() * Math.PI * 2;
    const yJitter = (Math.random() - 0.5) * 12;
    positions[i * 3]     = Math.cos(t) * r;
    positions[i * 3 + 1] = yJitter;
    positions[i * 3 + 2] = Math.sin(t) * r;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({
    color: 0x6688aa, size: 0.07, transparent: true, opacity: 0.42,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  var particleField = new THREE.Points(geo, mat);
  scene.add(particleField);
  window.__particleField = particleField; // exposed so animate() can twinkle it
}

// ---------- Animation loop ----------
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t  = clock.elapsedTime;

  // Gentle, multi-axis rotation
  root.rotation.y += dt * 0.13;
  root.rotation.x = Math.sin(t * 0.16) * 0.14;
  root.rotation.z = Math.cos(t * 0.11) * 0.05;

  // Per-node tumble + breathing pulse + counter-rotating wireframe shell
  for (const n of animatedNodes) {
    const ud = n.mesh.userData;
    n.mesh.rotation.x += ud.spin.x * dt;
    n.mesh.rotation.y += ud.spin.y * dt;
    n.mesh.rotation.z += ud.spin.z * dt;
    if (ud.shell) {
      ud.shell.rotation.x += ud.shellSpin.x * dt;
      ud.shell.rotation.y += ud.shellSpin.y * dt;
      ud.shell.rotation.z += ud.shellSpin.z * dt;
    }
    const s = 1 + Math.sin(t * 1.6 + n.phase) * n.pulseAmp;
    n.mesh.scale.setScalar(s);
  }

  // Orbit rings around M0 — each drifts on its own axis, independent of root
  for (const r of orbitRings) {
    r.mesh.rotateOnAxis(r.axis, r.speed * dt);
  }

  // Twinkling particle field — slow alpha modulation
  if (window.__particleField) {
    window.__particleField.material.opacity = 0.38 + Math.sin(t * 0.45) * 0.10;
  }

  // Slow camera drift
  camera.position.x = Math.sin(t * 0.07) * 1.6;
  camera.position.y = 3 + Math.sin(t * 0.10) * 0.6;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}
animate();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
