<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>A Model Is a Typed Operator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

<!-- KaTeX for proper math typesetting in the algebra equations and case-study annotations -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"
        onload="renderMathInElement(document.body, {delimiters: [{left: '$$', right: '$$', display: true},{left: '$', right: '$', display: false},{left: '\\(', right: '\\)', display: false}], throwOnError: false});"></script>
<style>
  :root {
    /* ---------- Palette: Domino dark (matches GFMI Boston deck) ---------- */
    --bg:           #0A0B0D;
    --paper:        #14171C;       /* card / panel surface */
    --paper-warm:   #1C2027;       /* slightly raised surface */
    --paper-sunken: #08090B;       /* deepest surface */
    --ink:          #FFFFFF;       /* primary text */
    --text-body:    #D5D9E1;
    --muted:        #8A93A0;
    --rule:         #242932;       /* hairline border */
    --rule-strong:  #3A4150;       /* prominent border */

    --accent:       #EC4899;       /* signature pink — emphasis text & chrome */
    --accent-soft:  rgba(236, 72, 153, 0.18);

    /* ---------- Diagram color axes (mapped to deck accents) ---------- */
    --c-input:   #4DD0E1;   /* cyan  — typed input X (deck "ML / typed" accent) */
    --c-output:  #F97316;   /* orange — typed output Y */
    --c-op:      #FFFFFF;   /* white  — the operator itself */
    --c-data:    #2DE2A0;   /* mint   — Ω_data    (live feeds, market state) */
    --c-compute: #4DD0E1;   /* cyan   — Ω_compute (FP/hardware/runtime substrate) */
    --c-config:  #F4D03F;   /* yellow — Ω_config  (knobs, thresholds, policy)    */
    --c-router:  #A855F7;   /* purple — dynamic router */
    --c-version: #EC4899;   /* pink   — version index */

    --orbit:      #2A3140;
    --orbit-soft: #1F242D;

    --serif: "Playfair Display", "Times New Roman", Georgia, serif;
    --sans:  "Source Sans 3", "Helvetica Neue", Arial, sans-serif;
    --mono:  "JetBrains Mono", "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ---------- Stage: 1920×1080 canvas, scaled to viewport ---------- */
  .stage {
    position: fixed;
    inset: 0;
    background: var(--bg);
    overflow: hidden;
  }
  .canvas {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 1920px;
    height: 1080px;
    margin-left: -960px;
    margin-top: -540px;
    transform-origin: center center;
    background: var(--bg);
  }
  .container {
    width: 100%;
    height: 100%;
    padding: 40px 48px;
    display: grid;
    grid-template-rows: minmax(0, 1fr);
  }

  /* ---------- masthead ---------- */
  .eyebrow {
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-size: 10px;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 6px;
  }
  h1 {
    font-family: var(--serif);
    font-weight: 900;
    font-size: clamp(24px, 2.8vw, 36px);
    line-height: 1.06;
    letter-spacing: -0.012em;
    margin: 0 0 8px;
    color: var(--ink);
  }
  h1 em { font-style: italic; color: var(--accent); }
  .dek {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(14px, 1.3vw, 16px);
    color: var(--text-body);
    max-width: 1020px;
    margin: 0 0 16px;
    line-height: 1.42;
  }

  /* ---------- panels ---------- */
  .panel {
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 18px 20px 20px;
    margin-bottom: 0;
  }
  .panel.cases-panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  .panel.cases-panel .cases {
    flex: 1;
    min-height: 0;
    align-items: stretch;
    grid-template-columns: minmax(0, 1fr);
    gap: 0;
  }
  .panel.cases-panel .case-card {
    height: 100%;
    min-height: 0;
    overflow: hidden;
  }
  /* svg height-locked so the equation + factoids never get pushed off-canvas */
  .panel.cases-panel .case-svg-wrap {
    flex: 1 1 0;
    min-height: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .panel.cases-panel .case-svg-wrap svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .panel-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 9px;
    margin-bottom: 12px;
    gap: 14px;
    flex-wrap: wrap;
  }
  .panel-title {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 19px;
    line-height: 1.1;
  }
  .panel-title small {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 400;
    color: var(--muted);
    margin-left: 10px;
    letter-spacing: 0;
  }
  .panel-sub {
    font-family: var(--sans);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ---------- atom row ---------- */
  .atom-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 18px;
    align-items: start;
  }

  .atom-svg-wrap {
    background: var(--paper-warm);
    border: 1px solid var(--rule);
    padding: 10px;
    position: relative;
  }
  .atom-svg-wrap svg { display: block; width: 100%; height: auto; }
  .atom-caption {
    position: absolute;
    top: 18px;
    left: 22px;
    font-family: var(--sans);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
    background: rgba(20, 23, 28, 0.85);
    padding: 6px 12px;
    font-weight: 600;
  }

  .atom-key {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 14px;
  }
  .formal {
    font-family: var(--serif);
    font-size: 15px;
    line-height: 1.55;
    color: var(--text-body);
  }
  .formal .sig {
    font-family: var(--mono);
    font-size: 19px;
    font-weight: 600;
    color: var(--ink);
    display: block;
    margin: 6px 0 10px;
    letter-spacing: 0;
  }
  .formal .sig .v {
    color: var(--c-version);
    font-size: 12px;
    vertical-align: super;
    font-weight: 700;
  }
  .formal em { font-style: italic; color: var(--accent); }

  .axiom-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-top: 4px;
  }
  .axiom {
    border: 1px solid var(--rule);
    padding: 8px 9px 9px;
    background: var(--paper-warm);
  }
  .axiom .num {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-bottom: 2px;
  }
  .axiom .name {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 13px;
    line-height: 1.1;
    margin-bottom: 3px;
  }
  .axiom .gloss {
    font-family: var(--sans);
    font-size: 10.5px;
    color: var(--text-body);
    line-height: 1.32;
  }

  .keyrow {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 18px;
    border-top: 1px solid var(--rule);
    padding-top: 12px;
  }
  .keyrow .item {
    font-size: 12px;
    color: var(--text-body);
    line-height: 1.4;
  }
  .keyrow .item .lab {
    font-family: var(--sans);
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 700;
    margin-bottom: 2px;
    color: var(--muted);
  }
  .keyrow .item .lab .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: 0;
  }

  /* ---------- algebra strip ---------- */
  .algebra {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  @media (max-width: 980px) {
    .algebra { grid-template-columns: repeat(2, 1fr); }
  }
  .alg-card {
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 16px 18px 18px;
    display: flex;
    flex-direction: column;
  }
  .alg-card .alg-eyebrow {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.06em;
    margin-bottom: 2px;
  }
  .alg-card .alg-name {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 22px;
    margin-bottom: 3px;
  }
  .alg-card .alg-notation {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0;
    margin-bottom: 6px;
    line-height: 1.25;
  }
  .alg-card svg { display: block; width: 100%; height: auto; margin-top: 4px; }
  .alg-card .alg-eqn {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--ink);
    background: var(--paper-warm);
    border-top: 1px solid var(--rule);
    padding: 12px 6px 8px;
    margin-top: 10px;
    text-align: center;
    letter-spacing: 0;
  }
  .alg-card .alg-deriv {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--accent);
    text-align: center;
    margin-top: 8px;
    letter-spacing: 0;
    line-height: 1.35;
  }
  .alg-card .alg-deriv .lab {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 700;
    display: block;
    margin-bottom: 3px;
  }
  .alg-card .alg-gloss {
    font-family: var(--sans);
    font-size: 13px;
    color: var(--text-body);
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dotted var(--rule);
    line-height: 1.4;
    text-align: center;
  }

  /* ---------- case studies ---------- */
  .cases {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  @media (max-width: 980px) { .cases { grid-template-columns: 1fr; } }
  .case-card {
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
  }
  .case-card .case-eyebrow {
    font-family: var(--mono);
    font-size: 16px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.10em;
    margin-bottom: 4px;
  }
  .case-card .case-name {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 56px;
    line-height: 1.0;
    margin-bottom: 4px;
  }
  .case-card .case-notation {
    font-family: var(--mono);
    font-size: 17px;
    color: var(--muted);
    letter-spacing: 0;
    margin-bottom: 14px;
    line-height: 1.3;
  }
  .case-svg-wrap {
    background: var(--paper-warm);
    border: 1px solid var(--rule);
    padding: 18px;
  }
  .case-svg-wrap svg { display: block; width: 100%; height: auto; }
  /* ---------- Compact bottom strip: math row | factoid row | gloss ---------- */
  .case-bottom {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px dotted var(--rule);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  /* Math row: type signature + total sensitivity, side-by-side */
  .math-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 32px;
    align-items: center;
    padding-bottom: 6px;
    border-bottom: 1px dotted var(--rule);
  }
  .case-card .case-eqn {
    font-family: var(--mono);
    font-size: 17px;
    color: var(--ink);
    background: transparent;
    border-top: none;
    padding: 0;
    margin: 0;
    text-align: center;
    letter-spacing: 0;
  }
  .case-card .case-deriv {
    font-family: var(--mono);
    font-size: 16px;
    color: var(--accent);
    text-align: center;
    margin: 0;
    padding: 0;
    letter-spacing: 0;
    line-height: 1.35;
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .case-card .case-deriv .lab {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 700;
    display: inline-block;
    margin: 0;
  }
  /* Gloss: very small, single line, deemphasized */
  .case-card .case-gloss {
    font-family: var(--sans);
    font-size: 13px;
    color: var(--muted);
    margin: 0;
    padding: 0;
    border-top: none;
    line-height: 1.4;
    text-align: center;
  }
  .case-card .case-gloss .legend {
    font-size: 0.92em;
    color: var(--text-faint, var(--muted));
    opacity: 0.8;
  }
  /* Factoid row: 4 tight columns */
  .case-foot {
    margin: 0;
    padding: 0;
    border-top: none;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 0 28px;
  }
  .case-foot .factoid {
    font-size: 14px;
    color: var(--text-body);
    line-height: 1.25;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .case-foot .factoid .lab {
    font-family: var(--sans);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.20em;
    font-weight: 700;
    color: var(--muted);
    line-height: 1.3;
  }
  .case-foot .factoid .body { flex: 1; }
  .case-foot .factoid .num {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
    color: var(--ink);
    margin-right: 6px;
  }
  .case-foot .factoid em { font-style: italic; color: var(--accent); }

  /* ---------- notes ---------- */
  .notes {
    border-top: 2px solid var(--accent);
    padding-top: 18px;
    font-family: var(--serif);
    font-size: 16px;
    line-height: 1.6;
    color: var(--text-body);
    column-count: 3;
    column-gap: 32px;
    column-rule: 1px solid var(--rule);
  }
  @media (max-width: 880px) { .notes { column-count: 1; } }
  .notes p { margin: 0 0 12px; break-inside: avoid; }
  .notes strong {
    font-family: var(--sans);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    display: inline-block;
    margin-right: 4px;
  }
  .notes em { color: var(--accent); font-style: italic; }
  .notes code {
    font-family: var(--mono);
    font-size: 13px;
    background: rgba(236, 72, 153, 0.10);
    padding: 1px 4px;
    color: var(--ink);
  }

  .byline {
    font-family: var(--sans);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-top: 26px;
    padding-top: 14px;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  /* ---------- shared SVG styling ---------- */
  .label-sans {
    font-family: "Source Sans 3", Helvetica, Arial, sans-serif;
    fill: var(--ink);
  }
  .label-serif {
    font-family: "Playfair Display", Georgia, serif;
    fill: var(--ink);
  }
  .label-mono {
    font-family: "JetBrains Mono", monospace;
    fill: var(--ink);
  }
  .lab-eyebrow {
    font-family: "Source Sans 3", Helvetica, Arial, sans-serif;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    fill: var(--muted);
    font-weight: 700;
  }
  .lab-muted { fill: var(--muted); }
  .lab-accent { fill: var(--accent); }

  /* flowing-dash animation for type signatures.
     Each keyframe's end-offset must be an integer multiple of its dash
     period so the loop closes seamlessly. flow-fast uses 6+4=10
     (offset −30 = 3 periods); flow-slow uses 6+6=12 (offset −24 = 2
     periods, also divides 3+3=6 used by Ω-feed paths). */
  @keyframes flow-fast-anim {
    to { stroke-dashoffset: -30; }
  }
  @keyframes flow-slow-anim {
    to { stroke-dashoffset: -24; }
  }
  .flow-fast {
    stroke-dasharray: 6 4;
    animation: flow-fast-anim 1.6s linear infinite;
  }
  .flow-slow {
    stroke-dasharray: 6 6;
    animation: flow-slow-anim 4.5s linear infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.95; }
    50% { opacity: 0.55; }
  }
  .pulse { animation: pulse 2.2s ease-in-out infinite; }

  /* hover affordances on the atom diagram */
  .hot:hover { cursor: help; }
  .hot:hover .hot-fill { fill: rgba(236, 72, 153, 0.10); }

</style>
</head>
<body>
<div class="stage">
<div class="canvas" id="canvas">
<div class="container">

  <!-- ======================================================== -->
  <!-- PANEL 3 — TWO WORLDS, ONE ALGEBRA                         -->
  <!-- ======================================================== -->
  <div class="panel cases-panel">
    <div class="cases">

      <!-- ============== CASE B: LLM AGENT ============== -->
      <div class="case-card">
        <div class="case-svg-wrap">
          <svg viewBox="0 10 760 380" xmlns="http://www.w3.org/2000/svg" aria-label="LLM agent dynamic routing">

            <defs>
              <marker id="ag-in" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M0,0 L10,5 L0,10 Z" fill="var(--c-input)"/>
              </marker>
              <marker id="ag-out" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M0,0 L10,5 L0,10 Z" fill="var(--c-output)"/>
              </marker>
              <marker id="ag-route" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M0,0 L10,5 L0,10 Z" fill="var(--c-router)"/>
              </marker>
              <marker id="ag-loop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M0,0 L10,5 L0,10 Z" fill="var(--accent)"/>
              </marker>
              <!-- Ω feed markers, one per Ω component, color-matched -->
              <marker id="ag-omega-d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
                <path d="M0,0 L10,5 L0,10 Z" fill="var(--c-data)"/>
              </marker>
              <marker id="ag-omega-c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
                <path d="M0,0 L10,5 L0,10 Z" fill="var(--c-compute)"/>
              </marker>
              <marker id="ag-omega-cf" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
                <path d="M0,0 L10,5 L0,10 Z" fill="var(--c-config)"/>
              </marker>
            </defs>

            <!-- ============================================================
                 Ω → R FEED ARROWS at the BOTTOM of the z-stack (drawn first so
                 every later element — prompt, router, tools, re-plan loop, merge,
                 output, Ω container — renders on top of them). Coordinates here
                 use the same translate(20, 280) frame as the Ω band group later. -->
            <g transform="translate(20, 280)">
              <path d="M 196,-9 L 196,-110"
                    fill="none" stroke="var(--c-data)" stroke-width="1.3"
                    stroke-dasharray="3 3"
                    marker-end="url(#ag-omega-d)" class="flow-slow"/>
              <path d="M 206,13 L 206,-110"
                    fill="none" stroke="var(--c-compute)" stroke-width="1.3"
                    stroke-dasharray="3 3"
                    marker-end="url(#ag-omega-c)" class="flow-slow"/>
              <path d="M 216,35 L 216,-110"
                    fill="none" stroke="var(--c-config)" stroke-width="1.3"
                    stroke-dasharray="3 3"
                    marker-end="url(#ag-omega-cf)" class="flow-slow"/>
            </g>

            <!-- LHS: prompt -->
            <g transform="translate(18, 80)">
              <rect width="118" height="92" fill="var(--paper-warm)" stroke="var(--c-input)" stroke-width="1.2"/>
              <text x="59" y="14" class="lab-eyebrow" text-anchor="middle" fill="var(--c-input)">x · prompt</text>
              <line x1="0" y1="22" x2="118" y2="22" stroke="var(--c-input)" stroke-width="0.6" opacity="0.4"/>
              <text x="9" y="38" class="label-serif" font-size="12" font-style="italic">"Compute the</text>
              <text x="9" y="54" class="label-serif" font-size="12" font-style="italic">10-day VaR for</text>
              <text x="9" y="70" class="label-serif" font-size="12" font-style="italic">portfolio P₇.</text>

<script>
  // scale 1920×1080 canvas to fit viewport
  (function() {
    var canvas = document.getElementById('canvas');
    function fit() {
      var sx = window.innerWidth  / 1920;
      var sy = window.innerHeight / 1080;
      var s  = Math.min(sx, sy);
      canvas.style.transform = 'scale(' + s + ')';
    }
    window.addEventListener('resize', fit);
    fit();
  })();
</script>
